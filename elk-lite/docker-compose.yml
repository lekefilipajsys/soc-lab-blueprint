services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.4.2}
    container_name: soc-elk-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "${ES_BIND:-127.0.0.1}:${ES_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-9.4.2}
    container_name: soc-elk-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=soc-elk-kibana
    ports:
      - "${KIBANA_BIND:-127.0.0.1}:${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash:
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION:-9.4.2}
    container_name: soc-elk-logstash
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
      - XPACK_MONITORING_ENABLED=false
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "${LOGSTASH_JSON_PORT:-5514}:5514/tcp"
      - "${LOGSTASH_JSON_PORT:-5514}:5514/udp"
      - "${LOGSTASH_SYSLOG_PORT:-5515}:5515/tcp"
      - "${LOGSTASH_SYSLOG_PORT:-5515}:5515/udp"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  esdata:

